name: Rastreador de passagens

# NOTA: o agendamento na nuvem foi desativado — o anti-bot da Smiles bloqueia
# IPs de datacenter. O rastreador roda agendado no Windows (Task Scheduler).
# O dispatch manual fica disponível para re-testar no futuro.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Google Chrome para o Playwright
        run: npx playwright install --with-deps chrome

      - name: Rodar o rastreador (navegador com display virtual)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HEADFUL: '1'
        run: xvfb-run --auto-servernum node src/scan.mjs

      - name: Salvar histórico de preços
        if: always()
        run: |
          git config user.name "rastreador-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/state.json 2>/dev/null || true
          git diff --cached --quiet || { git commit -m "atualiza histórico de preços [skip ci]"; git push; }
